# Aura AI Configuration
# Copy this file to aura.toml or ~/.config/aura/aura.toml

[ai]
# Provider: "openai" | "ollama" | "anthropic" (or any LiteLLM-supported provider)
provider = "openai"

# Model name (provider prefix is auto-added, e.g. ollama provider + "llama3" -> "ollama/llama3")
model = "gpt-4o-mini"

# API key (not needed for Ollama)
api_key = ""

# Custom API base URL (Ollama defaults to http://localhost:11434)
api_base = ""

# Response creativity (0.0 = deterministic, 1.0 = creative)
temperature = 0.7

# Maximum tokens in AI response
max_tokens = 2048

# ─── Example: Ollama (local) ────────────────────────────
# [ai]
# provider = "ollama"
# model = "llama3"           # or "qwen2", "mistral", "gemma2", etc.
# api_base = ""              # defaults to http://localhost:11434
# temperature = 0.7
# max_tokens = 2048

# ─── Example: Anthropic ─────────────────────────────────
# [ai]
# provider = "anthropic"
# model = "claude-3-haiku-20240307"
# api_key = "sk-ant-..."
# temperature = 0.7
# max_tokens = 2048

# ─── Example: OpenAI-compatible proxy ───────────────────
# [ai]
# provider = "openai"
# model = "gpt-4o-mini"
# api_key = "your-key"
# api_base = "https://your-proxy.example.com/v1"
# temperature = 0.7
# max_tokens = 2048

# ─── RAG Embedding Configuration ───────────────────────
# [embedding]
# Provider: "openai" | "ollama"
# provider = "openai"

# Embedding model
# model = "text-embedding-3-small"

# API key (not needed for Ollama)
# api_key = ""

# Custom API base URL (Ollama defaults to http://localhost:11434)
# api_base = ""

# Embedding vector dimension
# dimension = 512

# Chunk size (characters) for document splitting
# chunk_size = 1024

# Overlap between adjacent chunks (characters)
# chunk_overlap = 128

# Number of top-k chunks to retrieve per query
# top_k = 5

# ─── Example: Ollama embedding (local) ─────────────────
[embedding]
provider = "ollama"
model = "nomic-embed-text"
dimension = 768
chunk_size = 1024
chunk_overlap = 128
top_k = 5
